<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tube Solutions</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 300px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #111;
    color: #e0e0e0;
    font-size: 13px;
  }

  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid #1e1e1e;
    background: #0f0f0f;
  }
  .header h1 { font-size: 14px; font-weight: 700; color: #fff; }
  .settings-icon-btn {
    background: none; border: none; color: #555; cursor: pointer;
    font-size: 16px; padding: 4px 6px; border-radius: 4px;
    transition: color 0.12s;
  }
  .settings-icon-btn:hover { color: #aaa; }

  .view { display: none; }
  .view.active { display: block; }

  .section-label {
    font-size: 10px; font-weight: 600; color: #555;
    text-transform: uppercase; letter-spacing: 0.8px;
    padding: 12px 16px 6px;
  }

  /* ── Feature toggles ── */
  .feature-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 16px;
    border-bottom: 1px solid #191919;
  }
  .feature-name { font-size: 12px; color: #ccc; }

  .toggle {
    position: relative; width: 34px; height: 18px; flex-shrink: 0;
  }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-slider {
    position: absolute; inset: 0; background: #333;
    border-radius: 18px; cursor: pointer; transition: background 0.2s;
  }
  .toggle-slider:before {
    content: ''; position: absolute;
    width: 12px; height: 12px; left: 3px; top: 3px;
    background: #888; border-radius: 50%; transition: transform 0.2s, background 0.2s;
  }
  .toggle input:checked + .toggle-slider { background: #1a4a1a; }
  .toggle input:checked + .toggle-slider:before { transform: translateX(16px); background: #22c55e; }

  /* ── Channel rows ── */
  .channel-fill-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 9px 16px;
    border-bottom: 1px solid #191919;
    transition: background 0.1s;
  }
  .channel-fill-row:hover { background: #161616; }
  .channel-fill-name {
    font-size: 13px; color: #d0d0d0;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    flex: 1; margin-right: 10px;
  }
  .edit-btn {
    background: none; border: 1px solid #2e2e2e; color: #666;
    border-radius: 5px; padding: 5px 10px; font-size: 11px;
    cursor: pointer; font-family: inherit;
    transition: border-color 0.12s, color 0.12s;
  }
  .edit-btn:hover { border-color: #555; color: #bbb; }

  .empty-state {
    padding: 16px; text-align: center;
    color: #444; font-size: 12px; line-height: 1.7;
  }
  .empty-state strong { color: #666; display: block; margin-bottom: 4px; }

  .add-channel-link {
    display: block; padding: 10px 16px;
    font-size: 12px; color: #3a6fd8; cursor: pointer;
    border-top: 1px solid #191919;
    transition: color 0.12s;
  }
  .add-channel-link:hover { color: #6b99e8; }

  /* ── Settings view ── */
  .settings-back-row {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 16px; border-bottom: 1px solid #1e1e1e; cursor: pointer;
  }
  .settings-back-row:hover { background: #161616; }
  .back-arrow { font-size: 14px; color: #aaa; }
  .settings-back-row span { font-size: 13px; font-weight: 600; color: #ccc; }

  .section { padding: 10px 16px; border-bottom: 1px solid #1a1a1a; }
  .channel-row { display: flex; gap: 6px; align-items: center; margin-bottom: 8px; }
  select {
    flex: 1; background: #1a1a1a; border: 1px solid #2e2e2e;
    border-radius: 6px; color: #e0e0e0; font-size: 12px;
    padding: 6px 8px; outline: none; font-family: inherit;
  }
  select:focus { border-color: #3a6fd8; }
  .icon-btn {
    background: #1e1e1e; border: 1px solid #2e2e2e; color: #aaa;
    border-radius: 6px; padding: 5px 9px; cursor: pointer;
    font-size: 13px; transition: background 0.12s, color 0.12s;
  }
  .icon-btn:hover { background: #2a2a2a; color: #fff; }
  .icon-btn.danger:hover { background: #3a1010; color: #f87171; border-color: #6b2121; }

  #new-channel-row { display: none; gap: 6px; align-items: center; margin-bottom: 8px; }
  #new-channel-input {
    flex: 1; background: #1a1a1a; border: 1px solid #3a6fd8;
    border-radius: 6px; color: #e0e0e0; font-size: 12px;
    padding: 6px 8px; outline: none; font-family: inherit;
  }

  textarea {
    width: 100%; height: 130px; background: #1a1a1a;
    border: 1px solid #2e2e2e; border-radius: 8px; color: #e0e0e0;
    font-size: 12px; font-family: inherit; padding: 10px;
    resize: vertical; outline: none; line-height: 1.6;
  }
  textarea:focus { border-color: #3a6fd8; }
  textarea::placeholder { color: #444; }

  .save-row {
    display: flex; align-items: center;
    justify-content: space-between; margin-top: 8px;
  }
  .save-btn {
    background: #3a6fd8; color: #fff; border: none;
    border-radius: 6px; padding: 7px 16px; font-size: 12px;
    font-weight: 600; cursor: pointer; font-family: inherit;
  }
  .save-btn:hover { background: #2d5ab8; }
  .save-status { font-size: 12px; color: #16a34a; opacity: 0; transition: opacity 0.2s; }
  .save-status.show { opacity: 1; }
  .sync-note { font-size: 10px; color: #3a6fd8; margin-top: 6px; }
</style>
</head>
<body>

<div class="header">
  <h1>▶ Tube Solutions</h1>
  <button class="settings-icon-btn" id="open-settings-btn" title="Manage templates">⚙</button>
</div>

<!-- Main View -->
<div class="view active" id="view-main">
  <div class="section-label">Features</div>

  <div class="feature-row">
    <span class="feature-name">Aged Channel Checker</span>
    <label class="toggle">
      <input type="checkbox" id="feat-agedChecker" checked>
      <span class="toggle-slider"></span>
    </label>
  </div>
  <div class="feature-row">
    <span class="feature-name">Video Tracker & Bookmarks</span>
    <label class="toggle">
      <input type="checkbox" id="feat-tracker" checked>
      <span class="toggle-slider"></span>
    </label>
  </div>
  <div class="feature-row">
    <span class="feature-name">Studio EP Numbers</span>
    <label class="toggle">
      <input type="checkbox" id="feat-epNumbers" checked>
      <span class="toggle-slider"></span>
    </label>
  </div>
  <div class="feature-row">
    <span class="feature-name">Video Labels</span>
    <label class="toggle">
      <input type="checkbox" id="feat-videoLabels" checked>
      <span class="toggle-slider"></span>
    </label>
  </div>
  <div class="feature-row" style="border-bottom: 1px solid #222;">
    <span class="feature-name">Auto Description</span>
    <label class="toggle">
      <input type="checkbox" id="feat-autoDesc" checked>
      <span class="toggle-slider"></span>
    </label>
  </div>

  <div class="section-label">Description Templates</div>
  <div id="channel-fill-list"></div>
  <a class="add-channel-link" id="main-add-channel">+ Add channel template</a>
</div>

<!-- Settings View -->
<div class="view" id="view-settings">
  <div class="settings-back-row" id="back-to-main">
    <span class="back-arrow">←</span>
    <span>Manage Templates</span>
  </div>

  <div class="section">
    <div class="section-label" style="padding:0 0 8px">Channel</div>
    <div class="channel-row">
      <select id="channel-select"></select>
      <button class="icon-btn" id="add-channel-btn" title="Add channel">+</button>
      <button class="icon-btn danger" id="delete-channel-btn" title="Delete channel">✕</button>
    </div>
    <div id="new-channel-row">
      <input type="text" id="new-channel-input" placeholder="Channel name (e.g. Watches Explained)" />
    </div>
  </div>

  <div class="section">
    <div class="section-label" style="padding:0 0 8px">Description Template</div>
    <textarea id="template-input" placeholder="Enter your standard description for this channel..."></textarea>
    <div class="save-row">
      <button class="save-btn" id="save-btn">Save</button>
      <span class="save-status" id="save-status">✓ Saved!</span>
    </div>
    <div class="sync-note">☁ Synced across all your devices</div>
  </div>
</div>

<script src="popup.js"></script>
</body>
</html>
